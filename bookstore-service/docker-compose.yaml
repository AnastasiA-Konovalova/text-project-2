version: '3.8'

services:
  db:
    image: postgres:16
    container_name: my-postgres
    environment:
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: pgadmin
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - ./db/schemaCreate.sql:/docker-entrypoint-initdb.d/01-schemaCreate.sql
      - ./db/schemaInsert.sql:/docker-entrypoint-initdb.d/02-schemaInsert.sql
  pgadmin:
    image: dpage/pgadmin4
    container_name: my-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  db_data: