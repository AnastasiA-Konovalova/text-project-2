openapi: 3.0.4

info:
  title: Book store
  description: Книжный магазин
  version: 1.0.0

servers:
  - url: http://localhost:8080/api

paths:

  /books:
    get:
      tags:
        - book
      summary: Список книг
      operationId: getBooks

      parameters:
        - in: query
          name: id
          description: ID книги
          schema:
            $ref: '#/components/schemas/book-id'

        - in: query
          name: authorId
          description: ID автора
          schema:
            $ref: '#/components/schemas/author-id'

        - in: query
          name: seriesId
          description: ID серии
          schema:
            type: integer

        - in: query
          name: publisherId
          description: ID издателя
          schema:
            $ref: '#/components/schemas/publisher-id'

        - in: query
          name: genre
          description: Жанр книги
          schema:
            $ref: '#/components/schemas/Genre'

        - in: query
          name: publisherName
          description: Название издателя
          schema:
            type: string

        - in: query
          name: isPopular
          description: Только популярные книги
          schema:
            type: boolean

        - in: query
          name: isNew
          description: Только новые книги
          schema:
            type: boolean

        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/SortBook'
        - $ref: '#/components/parameters/Order'

      responses:
        '200':
          description: Список книг
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /authors/popular:
    get:
      tags:
        - authors

      summary: Получить популярных авторов
      description: Возвращает список популярных авторов
      operationId: getPopularAuthors

      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'

      responses:
        '200':
          description: Список популярных авторов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'

        '4XX':
          description: Клиентская ошибка при оплате корзины
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /account/purchased-books:
    get:
      tags:
        - account

      summary: Список приобретенных книг
      description: Получение списка приобретенных книг
      operationId: getPurchasedBooks

      security:
        - bearerAuth: []

      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/SortBook'
        - $ref: '#/components/parameters/Order'

      responses:
        '200':
          description: Список купленных книг

          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


  /account/favorite:
    post:
      tags:
        - account

      summary: Добавить книгу в избранное
      description: Добавление книги в избранное
      operationId: addFavoriteBook

      parameters:
        - $ref: '#/components/parameters/BookId'


      responses:
        '201':
          description:  Книга добавлена в избранное

          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


  /account/basket:
    get:
      tags:
        - account

      summary: Корзина с книгами
      description: Получение корзины с деталями
      operationId: getBasket

      security:
        - bearerAuth: []

      responses:
        '200':
          description: Корзина с деталями

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


  /account/basket/items:
    post:
      tags:
        - account

      summary: Добавить книгу в корзину
      description: Добавление книги в корзину
      operationId: addToBasket

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookIdRequest'

      responses:
        '201':
          description: Книга добавлена в корзину
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'
        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payment:
    post:
      tags:
        - payment

      summary: Оплата корзины
      description: Произведение оплаты корзины
      operationId: postPayment

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'

      responses:
        '201':
          description: Корзина оплачена

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '4XX':
          description: Клиентская ошибка при оплате корзины
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payment/{paymentId}/refund:
    post:
      tags:
        - payment

      summary: Возврат оплаты за книги
      operationId: refundPayBooksById

      security:
        - bearerAuth: []

      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/payment-id'

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPaymentRequest'

      responses:
        '201':
          description: Возврат выполнен успешно

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /account/basket/items/{itemId}:
    delete:
      tags:
        - account
      summary: Удаление товара из корзины
      description: Удаление товара из корзины по его id
      operationId: removeBasketItem

      security:
        - bearerAuth: []

      parameters:
        - name: itemId
          in: path
          required: true
          description: ID позиции корзины
          schema:
            $ref: '#/components/schemas/item-id'

      responses:
        '204':
          description: Удалено из корзины
        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /author/{authorId}:
    get:
      tags:
        - authors

      summary: Информация об авторе
      description: Получение информации об авторе книг
      operationId: getAuthorById

      parameters:
        - name: authorId
          in: path
          required: true
          description: Параметр для идентификации по id для поиска информации об авторе
          schema:
            $ref: '#/components/schemas/author-id'

      responses:
        '200':
          description: Вывод автора
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      tags:
        - auth

      summary: Регистрация пользователя
      description: Осуществление регистрации пользователя
      operationId: registerUser

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - email
                - password

              properties:
                email:
                  type: string

                password:
                  type: string

      responses:
        '201':
          description: Пользователь зарегистрирован
        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - auth

      summary: Ввод данных пользователя
      description: Авторизация пользователя по email и паролю
      operationId: loginUser

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - email
                - password

              properties:
                email:
                  type: string
                  format: email
                  description: Email пользователя

                password:
                  type: string
                  description: Пароль пользоватея

      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginUserResponse'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
        - auth

      summary: Выход из профиля
      description: Осуществление выхода из профиля
      operationId: postLogout

      security:
        - bearerAuth: []

      responses:
        '200':
          description: Сессия удалена

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /review:
    post:
      tags:
        - review

      summary: Отзыв на книгу
      description: Отзыв на книгу по id книги
      operationId: postReview

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookReviewInput'

      responses:
        '201':
          description:  Отзыв на книгу добавлен

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookReview'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


  /review/{reviewId}:
    get:
      tags:
        - review

      summary: Отзыв на книгу
      description: Метод для получения отзыва на книгу по id
      operationId: getBookReviewById

      parameters:
        - name: reviewId
          in: path
          required: true
          description: Параметр для идентификации по id для поиска отзыва
          schema:
            $ref: '#/components/schemas/review-id'

      responses:
        '200':
          description: Вывод отзыва по id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookReview'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags:
        - review

      summary: Внесение изменений в отзыв
      description: Внесение изменений по id отзыва
      operationId: changeReview

      security:
        - bearerAuth: []

      parameters:
        - name: reviewId
          in: path
          required: true
          description: Параметр для идентификации по id для изменения отзыва
          schema:
            $ref: '#/components/schemas/review-id'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                rating:
                  type: integer

      responses:
        '200':
          description: Отзыв на книгу изменен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookReview'
        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - review

      summary: Удаление отзыва
      description: Удаление отзыва по его ID
      operationId: deleteReviewById

      security:
        - bearerAuth: []

      parameters:
        - name: reviewId
          in: path
          required: true
          description: ID отзыва
          schema:
            $ref: '#/components/schemas/review-id'

      responses:
        '204':
          description: Отзыв успешно удалён

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /publisher/{publisherId}:
    get:
      tags:
        - publisher

      summary: Информация об издателе
      description: Получение информации об издателе книги
      operationId: getPublisherById

      parameters:
        - name: publisherId
          in: path
          required: true
          description: Параметр для идентификации по id для поиска информации об издателе
          schema:
            $ref: '#/components/schemas/publisher-id'

      responses:
        '200':
          description: Вывод издателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publisher'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /publisherSeries/{publisherSeriesId}:
    get:
      tags:
        - publisherSeries

      summary: Информация о серии
      description: Получение информации о серии книги
      operationId: getPublisherSeriesById

      parameters:
        - name: publisherSeriesId
          in: path
          required: true
          description: Параметр для идентификации по id для поиска информации о серии
          schema:
            $ref: '#/components/schemas/publisherSeries-id'

      responses:
        '200':
          description: Вывод серии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherSeries'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reviews:
    get:
      tags:
        - review

      summary: Список отзывов
      description: Вывод списка отзывов
      operationId: getReviews

      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/SortReview'
        - $ref: '#/components/parameters/Order'

      responses:
        '200':
          description: Список отзывов по книге

          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookReview'

        '4XX':
          description: Клиентская ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'



components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:

    BookId:
      name: bookId
      in: query
      description: Идентификатор книги
      required: true
      schema:
        type: integer

    Limit:
      name: limit
      in: query
      description: Количество элементов
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    Offset:
      name: offset
      in: query
      description: Смещение
      schema:
        type: integer
        minimum: 0
        default: 0

    SortBook:
      name: sortBook
      in: query
      description: Поле сортировки
      schema:
        type: string
        enum:
          - id
          - title
          - price
    SortReview:
      name: sortBook
      in: query
      description: Поле сортировки
      schema:
        type: string
        enum:
          - id
          - reviewerId
          - rating
    Order:
      name: order
      in: query
      description: Направление сортировки
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc

  schemas:

    book-id:
      type: integer
      description: Идентификатор книги

    payment-id:
      type: integer
      description: Идентификатор платежа

    item-id:
      type: integer
      description: Идентификатор корзины

    author-id:
      type: integer
      description: Идентификатор автора

    review-id:
      type: integer
      description: Идентификатор отзыва

    publisher-id:
      type: integer
      description: Идентификатор публикатора

    publisherSeries-id:
      type: integer
      description: Идентификатор серии

    Book:
      type: object

      properties:
        id:
          $ref: '#/components/schemas/book-id'

        title:
          type: string
          description: Название книги


        author:
          $ref: '#/components/schemas/Author'

        genre:
          $ref: '#/components/schemas/Genre'

        price:
          type: number
          format: double
          description: Информация о цене

        publisherId:
          $ref: '#/components/schemas/publisher-id'

        ISBN:
          type: string
          description: Информация о муждународном книжном номере

        series:
          $ref: '#/components/schemas/PublisherSeries'

        release:
          type: string
          description: Информация о дате выпуска книги

        description:
          type: string
          description: Описание книги

        pages:
          type: string
          description: Информация о количестве страниц

        weight:
          type: integer
          description: Информация о весе книги

        reviewCount:
          type: integer
          description: Количество отзывов
        averageRating:
          type: number
          description: Средний рейтинг


    Author:
      type: object

      properties:
        id:
          $ref: '#/components/schemas/author-id'

        name:
          type: string
          description: Имя автора

        surname:
          type: string
          description: Описание книги

        middleName:
          type: string
          description: Отчество автора

        pseudonym:
          type: string
          description: Псевдоним автора

    Genre:
      type: string
      enum:
        - HORROR
        - COMEDY
        - ROMANTIC
        - DRAMA
        - THRILLER

    Basket:
      type: object

      properties:
        id:
          type: integer
          description: Идентификатор корзины

        basketDetails:
          type: array
          description: Детализация информации о книгах в корзине
          items:
            $ref: '#/components/schemas/BasketDetail'

        totalPrice:
          type: number
          format: double
          description: Итоговая стоимость книг

        quantityBooks:
          type: integer
          description: Количество книг

        createdAt:
          type: string
          format: date-time
          description: Информация о дате создания корзины

        updatedAt:
          type: string
          format: date-time


    BasketDetail:
      type: object
      description: Позиция книги в корзине

      properties:
        id:
          $ref: '#/components/schemas/item-id'

        bookId:
          $ref: '#/components/schemas/book-id'

        title:
          type: string
          description: Название книги

        price:
          type: number
          format: double
          description: Цена одной книги

        quantity:
          type: integer
          description: Количество экземпляров книги в корзине

        totalPrice:
          type: number
          format: double
          description: Общая стоимость позиции (price * quantity)

    PaymentResponse:
      type: object

      properties:
        id:
          type: integer
